apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: default
  annotations:
    argocd.argoproj.io/sync-wave: '0'
spec:
  role: fss-march-eks-node

  amiSelectorTerms:
    - alias: al2023@latest
  # amiSelectorTerms:
  #   - name: "*"
  #     owners:
  #       - "amazon"
  #     tags: {}-role
  subnetSelectorTerms:
    - tags:
        Project: fss-march
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: fss-march-eks-cluster
  # metadataOptions:
  #   httpEndpoint: enabled
  #   httpProtocolIPv6: disabled
  #   httpPutResponseHopLimit: 1
  #   httpTokens: required
