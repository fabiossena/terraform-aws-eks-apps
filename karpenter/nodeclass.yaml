apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  amiFamily: AL2023

  role: "$(CLUSTER_ROLE)"

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "$(CLUSTER_NAME)"

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "$(CLUSTER_NAME)"

  tags:
    karpenter.sh/discovery: "$(CLUSTER_NAME)"