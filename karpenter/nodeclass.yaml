apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
  annotations:
    argocd.argoproj.io/sync-wave: '0'
spec:
  amiSelectorTerms:
    - name: "al2023@latest"
      owners:
        - "amazon"
      tags: {}
  role: fss-march-eks-node-role
  subnetSelectorTerms:
    - tags:
        Project: fss-march
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: fss-march-eks-cluster
  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 1
    httpTokens: required
  tags:
    karpenter.sh/discovery: fss-march-eks-cluster