apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
  annotations:
    argocd.argoproj.io/sync-wave: '0'
spec:
  amiFamily: AL2023

  amiSelectorTerms:
    - name: "*"
      owners:
        - "amazon"
      tags: {}

  role: "fss-march-eks-cluster-role"

  subnetSelectorTerms:
    - tags:
        Project: "fss-march"

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "fss-march-eks-cluster"

  tags:
    karpenter.sh/discovery: "fss-march-eks-cluster"