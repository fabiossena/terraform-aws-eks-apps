apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  amiFamily: AL2023

  # Obrigatório no v1
  amiSelectorTerms:
    - name: "*"                 # pega qualquer AMI dentro da família AL2023
      owners:
        - "amazon"              # AMIs oficiais da AWS
      tags: {}

  role: "fss-march-eks-cluster-role"

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "fss-march-eks-cluster"

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "fss-march-eks-cluster"

  tags:
    karpenter.sh/discovery: "fss-march-eks-cluster"